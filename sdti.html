<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SDTI - 苦逼设计师人格测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#000000;--bg2:#0a0a0a;--bg3:#111111;--surface:#0d0d0d;
  --text:#f0f0f0;--text2:#a8a8a8;--text3:#7a7a7a;
  --accent:#ffffff;--accent-dim:#333333;
  --border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);
  --radius:2px;--radius-sm:2px;
  --pie:#e07850;--frag:#5abfb5;--tefl:#c49a30;--copy:#9589d6;
  --char:#e05a70;--scap:#c96a48;--mule:#45b86a;--hole:#609fe0;
  --chil:#b88ed8;--cave:#909090;
}

html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:15px;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:pan-y;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

.container{max-width:720px;margin:0 auto;padding:0 32px}

/* ===== HOME ===== */
#home{text-align:center;padding:120px 0 100px}
.hero-badge{display:inline-flex;align-items:center;padding:5px 14px;border:1px solid var(--border);font-size:.72rem;font-weight:500;color:var(--text2);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:36px;font-family:'JetBrains Mono',monospace}
.hero-title{font-size:clamp(4rem,10vw,7rem);font-weight:900;letter-spacing:-6px;line-height:.95;color:var(--text);margin-bottom:16px;font-family:'Inter',sans-serif}
.hero-title span{color:var(--accent)}
.hero-subtitle{font-size:.82rem;font-weight:400;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.hero-cn{font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:600;color:var(--text2);margin-bottom:44px;letter-spacing:2px}
.hero-desc{font-size:1rem;color:var(--text2);max-width:460px;margin:0 auto 56px;line-height:1.85;font-weight:300}

.cta-wrap{display:inline-block;position:relative;margin-top:0}
.cta-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 44px;font-size:.92rem;font-weight:600;color:#fff;background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.25);cursor:pointer;transition:all .3s ease;border-radius:12px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
.cta-btn:hover{background:linear-gradient(135deg,rgba(255,255,255,.22),rgba(255,255,255,.08));border-color:rgba(255,255,255,.4);box-shadow:0 12px 40px rgba(0,0,0,.35);transform:translateY(-1px)}
.cta-btn:active{transform:scale(.98) translateY(0)}

.type-showcase{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:64px;padding-top:48px;border-top:1px solid var(--border)}
.type-pill{padding:6px 14px;font-size:.72rem;font-weight:400;border:1px solid var(--border);background:transparent;cursor:default;color:var(--text3);transition:all .2s;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}
.type-pill:hover{color:var(--text);border-color:var(--border-strong)}
.type-pill .code{font-weight:600;margin-right:5px}

/* ===== QUIZ ===== */
#quiz{display:none;padding:24px 0 80px}
.quiz-sticky{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);padding:18px 0 14px;margin:0 -32px;padding-left:32px;padding-right:32px;border-bottom:1px solid var(--border);padding-top:calc(18px + env(safe-area-inset-top))}
.progress-wrap{margin-bottom:12px}
.progress-track{height:3px;background:var(--bg3);overflow:hidden;position:relative}
.progress-bar{height:100%;background:var(--accent);transition:width .4s ease}
.progress-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.5);animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.3}50%{opacity:1}}
.quiz-meta{display:flex;justify-content:space-between;align-items:center}
.quiz-counter{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:500;color:var(--text2);letter-spacing:-.3px}
.quiz-counter .num{font-size:1.3rem;font-weight:700;color:var(--accent)}
.quiz-model{font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;padding:3px 11px;border:1px solid var(--border);font-size:.68rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}

.q-card{background:var(--surface);border:1px solid var(--border);padding:36px 32px;margin-bottom:16px;transition:border-color .25s}
.q-card:hover{border-color:var(--border-strong)}
.q-dim-tag{display:inline-block;font-size:.68rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:18px;font-family:'JetBrains Mono',monospace}
.q-text{font-size:1.15rem;font-weight:500;line-height:1.6;color:var(--text);margin-bottom:28px;letter-spacing:-.15px}

.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-item{display:flex;align-items:center;gap:14px;padding:15px 20px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s ease;font-size:.92rem;color:var(--text2);line-height:1.45}
.opt-item:hover{border-color:var(--border-strong);color:var(--text)}
.opt-item.selected{border-color:var(--accent);color:var(--text);background:rgba(255,255,255,.02)}
.opt-key{width:28px;height:28px;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:var(--text3);flex-shrink:0;font-family:'JetBrains Mono',monospace;transition:all .15s}
.opt-item.selected .opt-key{border-color:var(--accent);background:var(--accent);color:#000}

.quiz-nav{display:flex;justify-content:space-between;gap:16px;margin:28px 0 48px}
.nav-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;font-size:.86rem;font-weight:500;cursor:pointer;transition:all .25s ease;border:1px solid rgba(255,255,255,.2);color:var(--text);text-transform:uppercase;letter-spacing:.5px;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.03));border-radius:10px;backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);box-shadow:0 4px 20px rgba(0,0,0,.25),inset 0 1px 1px rgba(255,255,255,.12),inset 0 -1px 2px rgba(0,0,0,.1);overflow:hidden}
.nav-btn::after{content:'';position:absolute;top:2px;left:3px;right:3px;height:35%;border-radius:8px 8px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);pointer-events:none}
.nav-btn:hover:not(:disabled){border-color:rgba(255,255,255,.35);background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));box-shadow:0 6px 24px rgba(0,0,0,.3)}
.nav-btn.primary{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.06));border-color:rgba(255,255,255,.35);font-weight:600;color:#fff}
.nav-btn.primary:hover{box-shadow:0 8px 28px rgba(0,0,0,.32);transform:translateY(-1px)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}

/* ===== RESULT ===== */
#result{display:none;padding:48px 0 100px}
.result-wrap{background:var(--surface);border:1px solid var(--border);padding:56px 40px;position:relative;overflow:hidden}
.result-accent-bar{position:absolute;top:0;left:0;right:0;height:2px}

.result-label{display:inline-flex;align-items:center;padding:4px 14px;border:1px solid var(--border);font-size:.68rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.result-code{font-size:clamp(3.5rem,9vw,5.5rem);font-weight:900;letter-spacing:8px;line-height:1;margin-bottom:4px;font-family:'Inter',sans-serif}
.result-name{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:300;color:var(--text2);margin-bottom:28px;letter-spacing:1px}
.result-bio{font-size:.94rem;color:var(--text2);line-height:1.9;max-width:520px;margin:0 auto 40px;text-align:left;font-weight:300}

.trait-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:32px 0}
.trait-cell{padding:13px 10px;border:1px solid var(--border);text-align:center;transition:border-color .2s}
.trait-cell:hover{border-color:var(--border-strong)}
.trait-cell-text{font-size:.78rem;font-weight:500;color:var(--text2)}

.ranking-section{margin-top:44px;text-align:left}
.ranking-h{font-size:.75rem;font-weight:500;color:var(--text3);margin-bottom:14px;text-transform:uppercase;letter-spacing:2px;font-family:'JetBrains Mono',monospace}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:4px;transition:background .15s}
.rank-row:nth-child(odd){background:rgba(255,255,255,.01)}
.rank-row.top-rank{border-left:2px solid var(--accent);background:rgba(255,255,255,.03)!important}
.rank-num{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;flex-shrink:0;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.rank-num.n1{color:var(--accent)}.rank-name{font-weight:500;font-size:.84rem;flex:1}
.rank-meter{width:60px;height:3px;background:var(--bg3);flex-shrink:0;overflow:hidden}
.rank-fill{height:100%;transition:width .8s ease}
.rank-pct{font-size:.7rem;color:var(--text3);font-weight:500;width:34px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}

.dim-section{margin-top:44px;padding-top:28px;border-top:1px solid var(--border);text-align:left}
.dim-h{font-size:.75rem;font-weight:500;color:var(--text3);margin-bottom:16px;text-transform:uppercase;letter-spacing:2px;font-family:'JetBrains Mono',monospace}
.dim-line{display:flex;align-items:center;gap:12px;padding:6px 0}
.dim-n{width:80px;flex-shrink:0;font-size:.78rem;color:var(--text3);font-weight:400}
.dim-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:20px;font-size:.64rem;font-weight:600;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.dim-badge.L{color:var(--mule)}.dim-badge.M{color:var(--tefl)}.dim-badge.H{color:var(--pie)}
.dim-track{flex:1;height:3px;background:var(--bg3);overflow:hidden}
.dim-fill{height:100%;transition:width .8s ease}

.retest-wrap{margin-top:48px}
.retest-btn{position:relative;display:inline-flex;align-items:center;gap:6px;padding:13px 34px;font-size:.86rem;font-weight:500;color:var(--text2);border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .25s ease;text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border-radius:10px;backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);box-shadow:0 4px 20px rgba(0,0,0,.22),inset 0 1px 1px rgba(255,255,255,.1),inset 0 -1px 2px rgba(0,0,0,.08);overflow:hidden}
.retest-btn::after{content:'';position:absolute;top:2px;left:3px;right:3px;height:35%;border-radius:8px 8px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);pointer-events:none}
.retest-btn:hover{border-color:rgba(255,255,255,.35);color:var(--text);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.04));box-shadow:0 6px 24px rgba(0,0,0,.28)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.fade-up{animation:fadeUp .6s ease both}
.scale-in{animation:scaleIn .5s ease both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

@media(max-width:768px){
  .container{padding:0 24px}
  #home{padding:80px 0 70px}
  .hero-badge{font-size:.66rem;padding:4px 12px;letter-spacing:2px}
  .hero-title{letter-spacing:-4px}
  .hero-subtitle{font-size:.72rem;letter-spacing:2px}
  .hero-cn{font-size:1.15rem;margin-bottom:32px}
  .hero-desc{font-size:.92rem;margin-bottom:44px}
  .cta-btn{padding:14px 36px;font-size:.86rem}
  .type-showcase{gap:5px;margin-top:48px;padding-top:36px}
  .type-pill{padding:5px 11px;font-size:.66rem}
  .quiz-sticky{margin:0 -24px;padding-left:24px;padding-right:24px}
  .q-card{padding:28px 24px}
  .q-text{font-size:1.06rem}
  .opt-item{padding:13px 16px;gap:12px;font-size:.88rem}
  .result-wrap{padding:44px 28px}
  .result-code{letter-spacing:5px}
  .trait-row{grid-template-columns:repeat(3,1fr);gap:5px}
  .trait-cell{padding:11px 8px}
  .rank-row{gap:10px;padding:9px 12px}
  .dim-n{width:68px;font-size:.74rem}
}

@media(max-width:480px){
  html{font-size:14px}
  body{-webkit-text-size-adjust:100%}
  .container{padding:0 18px}
  #home{padding:60px 0 50px}
  .hero-badge{font-size:.62rem;padding:4px 10px;letter-spacing:1.8px;margin-bottom:24px}
  .hero-title{font-size:clamp(2.8rem,14vw,4.5rem);letter-spacing:-2.5px;line-height:1}
  .hero-subtitle{font-size:.65rem;letter-spacing:1.8px;margin-bottom:6px}
  .hero-cn{font-size:1.05rem;font-weight:600;margin-bottom:28px;letter-spacing:1px}
  .hero-desc{font-size:.88rem;max-width:100%;line-height:1.8;margin-bottom:36px}
  .cta-btn{padding:13px 30px;font-size:.84rem;border-radius:10px}
  .cta-wrap{width:100%}
  .cta-btn{width:100%;justify-content:center}
  .type-showcase{flex-direction:column;align-items:center;gap:4px;margin-top:40px;padding-top:32px}
  .type-pill{padding:5px 12px;font-size:.64rem;width:100%;max-width:260px;text-align:center;justify-content:center;display:inline-flex}
  .quiz-sticky{margin:0 -18px;padding:14px 0 12px;padding-left:18px;padding-right:18px}
  .progress-wrap{margin-bottom:10px}
  .quiz-counter{font-size:.76rem}
  .quiz-counter .num{font-size:1.2rem}
  .quiz-model{font-size:.64rem;padding:3px 9px;letter-spacing:1px}
  .q-card{padding:22px 18px;margin-bottom:12px}
  .q-dim-tag{font-size:.62rem;margin-bottom:14px;letter-spacing:1.5px}
  .q-text{font-size:1rem;margin-bottom:22px}
  .opt-list{gap:7px}
  .opt-item{padding:12px 14px;gap:11px;font-size:.85rem;min-height:48px;-webkit-tap-highlight-color:transparent}
  .opt-key{width:26px;height:26px;font-size:.72rem}
  .quiz-nav{margin:20px 0 36px;gap:12px}
  .nav-btn{padding:11px 20px;font-size:.8rem;letter-spacing:.3px;border-radius:8px;flex:1}
  #result{padding:32px 0 60px}
  .result-wrap{padding:28px 18px}
  .result-label{font-size:.62rem;padding:3px 11px;letter-spacing:1.5px}
  .result-code{font-size:clamp(2.6rem,13vw,4rem);letter-spacing:4px}
  .result-name{font-size:1rem;margin-bottom:20px}
  .result-bio{font-size:.86rem;line-height:1.85;margin-bottom:28px}
  .trait-row{grid-template-columns:repeat(2,1fr);gap:5px;margin:24px 0}
  .trait-cell{padding:10px 7px}
  .trait-cell-text{font-size:.72rem}
  .ranking-section{margin-top:32px}
  .ranking-h{font-size:.68rem;margin-bottom:10px;letter-spacing:1.5px}
  .rank-row{gap:8px;padding:8px 10px;margin-bottom:3px}
  .rank-num{width:20px;height:20px;font-size:.64rem}
  .rank-name{font-size:.78rem}
  .rank-meter{width:50px}
  .rank-pct{font-size:.64rem;width:30px}
  .dim-section{margin-top:32px;padding-top:22px}
  .dim-h{font-size:.68rem;margin-bottom:12px;letter-spacing:1.5px}
  .dim-line{gap:8px;padding:5px 0}
  .dim-n{width:60px;font-size:.7rem}
  .dim-badge{width:26px;height:17px;font-size:.58rem}
  .retest-wrap{margin-top:36px;text-align:center}
  .retest-btn{width:100%;max-width:280px;justify-content:center;padding:12px 28px;font-size:.82rem}
}
</style>
</head>
<body>

<div class="container">

<!-- HOME -->
<section id="home">
  <div class="hero-badge fade-up">Personality Test</div>
  <h1 class="hero-title fade-up d1"><span>SDTI</span></h1>
  <p class="hero-subtitle fade-up d2">Shitty Designer Test of Insanity</p>
  <p class="hero-cn fade-up d3">苦逼设计师人格测试</p>
  <p class="hero-desc fade-up d4">
    你在设计院到底属于哪一种苦命物种？<br>30道灵魂拷问，15维人格画像，精准匹配你的设计师人设。
  </p>
  <div class="cta-wrap fade-up d5"><button class="cta-btn" onclick="startQuiz()">开始测试 <span style="font-size:1.1em">→</span></button></div>

  <div class="type-showcase fade-up d5">
    <span class="type-pill"><span class="code" style="color:var(--pie)">PIE</span>画饼忽悠王</span>
    <span class="type-pill"><span class="code" style="color:var(--frag)">FRAG</span>脆皮熬夜党</span>
    <span class="type-pill"><span class="code" style="color:var(--tefl)">TEFL</span>不粘锅大师</span>
    <span class="type-pill"><span class="code" style="color:var(--copy)">COPY</span>套图艺术家</span>
    <span class="type-pill"><span class="code" style="color:var(--char)">CHAR</span>底薪慈善家</span>
    <span class="type-pill"><span class="code" style="color:var(--scap)">SCAP</span>苦逼背锅侠</span>
    <span class="type-pill"><span class="code" style="color:var(--mule)">MULE</span>勤恳老黄牛</span>
    <span class="type-pill"><span class="code" style="color:var(--hole)">HOLE</span>专业填坑侠</span>
    <span class="type-pill"><span class="code" style="color:var(--chil)">CHIL</span>反内卷先锋</span>
    <span class="type-pill"><span class="code" style="color:var(--cave)">CAVE</span>社恐自闭人</span>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz">
  <div class="quiz-sticky">
    <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" id="progressFill"></div></div></div>
    <div class="quiz-meta">
      <span class="quiz-counter"><span class="num" id="qNum">1</span><span style="color:var(--text3)"> / 30</span></span>
      <span class="quiz-model" id="modelTag">SELF 自我认知</span>
    </div>
  </div>
  <div id="questionArea"></div>
  <div class="quiz-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevQuestion()" disabled>← 上一题</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
  </div>
</section>

<!-- RESULT -->
<section id="result">
  <div class="result-wrap scale-in" id="resultCard">
    <div class="result-accent-bar" id="accentBar"></div>
    <div class="result-label" id="resultLabel">Your Diagnosis</div>
    <div class="result-code" id="resultCode">PIE</div>
    <div class="result-name" id="resultName">画饼忽悠王</div>
    <p class="result-bio" id="resultBio"></p>
    <div class="trait-row" id="traitGrid"></div>
    <div class="ranking-section" id="matchList"></div>
    <div class="dim-section" id="dimDetail"></div>
    <div class="retest-wrap">
      <button class="retest-btn" onclick="restart()">重新测试 ↺</button>
    </div>
  </div>
</section>

</div>

<script>
const DIMENSIONS=[
  {id:'s1',name:'自我定位',model:'SELF',label:'自我认知'},
  {id:'s2',name:'能力评估',model:'SELF',label:'自我认知'},
  {id:'s3',name:'职业认同',model:'SELF',label:'自我认知'},
  {id:'e1',name:'熬夜耐受',model:'EMO',label:'情绪状态'},
  {id:'e2',name:'压力反应',model:'EMO',label:'情绪状态'},
  {id:'e3',name:'情绪管理',model:'EMO',label:'情绪状态'},
  {id:'a1',name:'改图态度',model:'ATT',label:'工作态度'},
  {id:'a2',name:'甲方应对',model:'ATT',label:'工作态度'},
  {id:'a3',name:'责任归属',model:'ATT',label:'工作态度'},
  {id:'ac1',name:'工作节奏',model:'ACT',label:'行为模式'},

let currentQ=0,answers={};

function startQuiz(){
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  answers={};currentQ=0;
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQuestion(){
  const q=QUESTIONS[currentQ],dim=DIMENSIONS.find(d=>d.id===q.dim);
  document.getElementById('qNum').textContent=currentQ+1;
  document.getElementById('progressFill').style.width=((currentQ+1)/30*100)+'%';
  const mt=document.getElementById('modelTag');
  mt.textContent=dim.model+' '+dim.label;

  const sel=answers[currentQ];
  let h=`<div class="q-card fade-up">
    <div class="q-dim-tag"><span class="q-dim-dot"></span>${dim.name} · ${dim.label}</div>
    <div class="q-text">${currentQ+1}. ${q.q}</div>
    <div class="opt-list">`;
  const letters=['A','B','C'];
  q.opts.forEach((o,i)=>{
    const picked=sel===i?'selected':'';
    h+=`<div class="opt-item ${picked}" onclick="pick(${i})">
      <span class="opt-key">${letters[i]}</span>${o.t}</div>`;
  });
  h+='</div></div>';
  document.getElementById('questionArea').innerHTML=h;
  document.getElementById('prevBtn').disabled=currentQ===0;
  document.getElementById('nextBtn').textContent=currentQ===29?'查看结果 →':'下一题 →';
}

function pick(i){answers[currentQ]=i;renderQuestion()}
function nextQuestion(){if(currentQ<29){currentQ++;renderQuestion()}else calcResult()}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion()}}

function calcResult(){
  const ds={};
  DIMENSIONS.forEach(d=>ds[d.id]=0);
  QUESTIONS.forEach((q,i)=>{if(answers[i]!==undefined)ds[q.dim]+=q.opts[answers[i]].v});
  const uv=[];
  DIMENSIONS.forEach(d=>{const s=ds[d.id];uv.push(s<=2?1:s<=3?2:3)});

  const results=[];
  Object.values(TYPES).forEach(t=>{
    let td=0,em=0;
    for(let i=0;i<15;i++){const d=Math.abs(uv[i]-t.vec[i]);td+=d;if(d===0)em++}
    const sim=Math.round((1-td/30)*100);
    results.push({code:t.code,name:t.name,color:t.color,bio:t.bio,traits:t.traits,td,em,sim,vec:t.vec,uv});
  });
  results.sort((a,b)=>a.td!==b.td?a.td-b.td:b.em-a.em);
  showResult(results,uv);
}

function showResult(results,uv){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';

  const t=results[0],rc=document.getElementById('resultCard');
  document.getElementById('accentBar').style.background=t.color;
  document.getElementById('resultCode').textContent=t.code;
  document.getElementById('resultCode').style.color=t.color;
  document.getElementById('resultName').textContent=t.name;
  document.getElementById('resultBio').textContent=t.bio;

  let th='';
  t.traits.forEach(tr=>th+=`<div class="trait-cell"><div class="trait-cell-text">${tr}</div></div>`);
  document.getElementById('traitGrid').innerHTML=th;

  let rh='<div class="ranking-h">完整匹配排行</div>';
  results.slice(0,10).forEach((r,i)=>{
    const top=i===0?'top-rank':'';
    rh+=`<div class="rank-row ${top}">
      <span class="rank-num n${i<3?i+1:3}">${i+1}</span>
      <span class="rank-name" style="color:${r.color}">${r.code} ${r.name}</span>
      <div class="rank-meter"><div class="rank-fill" style="width:${r.sim}%;background:${r.color}"></div></div>
      <span class="rank-pct">${r.sim}%</span></div>`;
  });
  document.getElementById('matchList').innerHTML=rh;

  let dh='<div class="dim-h">你的15维人格画像</div>';
  const lm={1:'L',2:'M',3:'H'};
  DIMENSIONS.forEach((d,i)=>{
    dh+=`<div class="dim-line">
      <span class="dim-n">${d.name}</span>
      <span class="dim-badge ${lm[uv[i]]}">${lm[uv[i]]}</span>
      <div class="dim-track"><div class="dim-fill" style="width:${uv[i]*33.33}%;background:${['#30d158','#b8860b','#ff6b35'][uv[i]-1]}"></div></div></div>`;
  });
  document.getElementById('dimDetail').innerHTML=dh;

  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  document.getElementById('result').style.display='none';
  document.getElementById('home').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
